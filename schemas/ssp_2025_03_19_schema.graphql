"""This is an enum identifying a particular Bitcoin Network."""
enum BitcoinNetwork {
  """The production version of the Bitcoin Blockchain."""
  MAINNET

  """A test version of the Bitcoin Blockchain, maintained by Lightspark."""
  REGTEST

  """
  A test version of the Bitcoin Blockchain, maintained by a centralized organization. Not in use at Lightspark.
  """
  SIGNET

  """A test version of the Bitcoin Blockchain, publicly available."""
  TESTNET
}

type ClaimStaticDeposit implements UserRequest & Entity {
  """
  The unique identifier of this entity across all Lightspark systems. Should be treated as an opaque string.
  """
  id: ID!

  """The date and time when the entity was first created."""
  created_at: DateTime!

  """The date and time when the entity was last updated."""
  updated_at: DateTime!

  """The network the lightning send request is on."""
  network: BitcoinNetwork!

  """A computed version of the status of this user request."""
  request_status: SparkUserRequestStatus

  """The amount originally requested to be deposited."""
  deposit_amount: CurrencyAmount!

  """The amount of credit to be added to the user's balance."""
  credit_amount: CurrencyAmount!

  """The maximum fee that the user is willing to pay."""
  max_fee: CurrencyAmount!

  """The status of the request."""
  status: ClaimStaticDepositStatus!

  """The transaction id of the deposit."""
  transaction_id: String!

  """The output index of the deposit."""
  output_index: Int!

  """The Bitcoin network of the deposit."""
  bitcoin_network: BitcoinNetwork!

  """The id of the transfer."""
  transfer_spark_id: UUID

  """Static deposit address."""
  static_deposit_address: String
}

input ClaimStaticDepositInput {
  """The transaction id of the deposit."""
  transaction_id: String!

  """The output index of the deposit."""
  output_index: Int!

  """The bitcoin network of the deposit."""
  network: BitcoinNetwork!

  """The amount of sats to claim for FIXED_AMOUNT quote."""
  credit_amount_sats: Long

  """The amount of sats to deduct from the UTXO value for MAX_FEE quote."""
  max_fee_sats: Long

  """The deposit key of the user."""
  deposit_secret_key: String!

  """The signature of the claim provided by the user."""
  signature: String!

  """The signature of the quote provided by the SSP."""
  quote_signature: String!

  """The type of the claim request."""
  request_type: ClaimStaticDepositRequestType = null @deprecated(reason: "Different types of claim requests are no longer supported.")
}

type ClaimStaticDepositOutput {
  transfer_id: UUID!
}

enum ClaimStaticDepositRequestType {
  FIXED_AMOUNT
  MAX_FEE
}

enum ClaimStaticDepositStatus {
  """
  Initial status when the claim request is created in the database. Validation has passed and the spend transaction is prepared.
  """
  CREATED

  """
  Spark leaves have been locked and an outbound transfer record created. The SSP is preparing to give the user Spark balance in exchange for the UTXO.
  """
  TRANSFER_CREATED

  """
  Failed to lock leaves or create the transfer record. This typically happens due to insufficient SSP liquidity.
  """
  TRANSFER_CREATION_FAILED

  """
  The Spark leaves transfer to the user has been completed successfully. The user can now claim the balance. UTXO swap was finalized with the Signing Operator.
  """
  TRANSFER_COMPLETED

  """
  Failed during UTXO swap initiation with the Signing Operator (SO). The leaves are unlocked and the request is marked as failed.
  """
  UTXO_SWAPPING_FAILED

  """
  The L1 spend transaction has been signed (FROST aggregation completed) and is ready to be broadcast to the Bitcoin network.
  """
  SPEND_TX_CREATED

  """
  The L1 spend transaction has been broadcast to the Bitcoin network. Awaiting on-chain confirmation.
  """
  SPEND_TX_BROADCAST

  """
  The L1 spend transaction has been confirmed on-chain. This is the final successful state - the UTXO is now part of the SSP's confirmed balance.
  """
  SPEND_TX_CONFIRMED
}

