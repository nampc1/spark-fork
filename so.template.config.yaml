dkg:
  min_available_keys: 100
bitcoind:
  regtest:
    network: regtest
    host: 127.0.0.1:8332
    rpcuser: testutil
    rpcpassword: testutilpassword
    zmqpubrawblock: tcp://127.0.0.1:28332
token:
  disconnect_lrc20_node: true

grpc:
  # Timeout for establishing incoming connections
  server_connection_timeout: 5s
  # Interval between keepalive pings
  server_keepalive_time: 300s
  # Timeout waiting for keepalive ack before closing connection
  server_keepalive_timeout: 20s
  # Per-request timeout for unary RPC handlers
  server_unary_handler_timeout: 60s
  # Per-request timeout for unary RPC client calls
  # 0 or unset means to fall back to the default value.
  # < 0 means disable timeouts
  # > 0 means enable timeouts with the specified value
  client_timeout: 20s

lrc20:
  regtest:
    disablerpcs: true
    disablel1: true
    network: regtest
    host: 127.0.0.1:18530
    withdrawbondsats: 10000 # 0.01 BTC
    withdrawrelativeblocklocktime: 1000
    grpcpagesize: 200
    grpcpoolsize: 10
service_authz:
  mode: 1 # AuthzModeDisabled
  ip_allowlist: []
xff_client_ip_position: 0
rate_limiter:
  enabled: true
  window: 60s
  max_requests: 1000
  methods: []
return_detailed_errors: true
return_detailed_panic_errors: true
tracing:
  enabled: false
  otel_collector_endpoint: ""
  otel_collector_cert_path: ""
  global_sampling_rate: 0
  span_sampling_config:
    per_span_sampling_rates: {}
    allow_list: []
    block_list: []
knobs:
  static_values:
    # Database
    spark.database.only_commit_dirty: 100
    spark.database.pool.min_conns: 4
    # Deposit/transfer validation
    spark.so.require_multiple_conf_for_non_static_deposit: 1
    spark.so.max_unused_deposit_addresses: 64
    spark.so.filter_ssp_counter_swap_as_transfer@REGTEST: 100
    # Chain watcher
    spark.so.watch_chain.tweak_keys_for_coop_exit_delay.enabled: 1
    # Instant static deposit
    spark.so.enable_instant_static_deposit@REGTEST: 100
    spark.so.max_pending_instant_static_deposit_amount: 1000000
    # Lightning
    spark.so.shutdown_hodl_invoices: 0
    # MIMO
    spark.so.mimo_transfer_multi_receiver_enabled: 1
    spark.so.read_mimo_data_model_query_transfers: 1
    spark.so.read_mimo_data_model_get_stuck_transfers: 1
    spark.so.read_mimo_data_model_transfer_send: 1
    # Tokens
    spark.so.tokens.allow_extra_metadata_on_mainnet: 0
    spark.so.tokens.backfill_create_mint_finalized_status_enabled: 0
    spark.so.tokens.coordinated_freeze_enabled: 0
    spark.so.tokens.enable_justice_transactions: 1
    spark.so.tokens.enforce_withdrawal_signature_validation: 0
    spark.so.tokens.multisig_issuer_enabled: 0
    spark.so.tokens.token_transaction_v3_enabled: 100
    spark.so.tokens.token_transaction_v3_phase2_enabled: 100
    spark.so.tokens.token_transaction_v3_phase2_retry_enabled: 100
    spark.so.tokens.tx_events_enabled: 100
    # Read-only sessions
    spark.so.ro_session@/spark.SparkService/query_nodes: 100
    spark.so.ro_session@/spark.SparkService/query_pending_transfers: 100
    spark.so.ro_session@/spark_token.SparkTokenService/query_token_outputs: 100
